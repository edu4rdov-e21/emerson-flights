name: coleta

on:
  schedule:
    # a cada 3 horas, no minuto 23 (fora do pico do Actions)
    - cron: "23 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: coleta
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: collector/requirements.txt

      - name: Instalar dependências
        run: pip install -r collector/requirements.txt

      - name: Rodar coletor
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
        run: python collector/collect.py

      - name: Commitar dados novos
        run: |
          git config user.name "emerson-bot"
          git config user.email "edu4rdov@gmail.com"
          git add data/
          if git diff --cached --quiet; then
            echo "nada mudou nesta varredura"
          else
            git commit -m "coleta: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
